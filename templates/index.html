<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI-Mizan | AI Price Forecasting</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&family=Lora:wght@400;500&display=swap" rel="stylesheet">
    <style>
        body {
            margin: 0;
            padding: 0;
            background-color: #042419;
            font-family: 'Lora', serif;
        }
        .hero {
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background: linear-gradient(rgba(4, 36, 25, 0.7), rgba(4, 36, 25, 0.9)), 
                        url('https://www.transparenttextures.com/patterns/islamic-art.png');
            text-align: center;
            border-bottom: 5px solid #D4AF37;
        }
        h1 {
            font-family: 'Playfair Display', serif;
            font-size: 5rem;
            color: #D4AF37;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.5);
            margin-bottom: 20px;
        }
        p {
            color: #FDF5E6;
            font-size: 1.5rem;
            letter-spacing: 2px;
            margin-bottom: 40px;
        }
        .btn-gold {
            background-color: #D4AF37;
            color: #042419;
            padding: 15px 45px;
            font-size: 1.1rem;
            font-weight: bold;
            text-transform: uppercase;
            border-radius: 0;
            text-decoration: none;
            transition: all 0.4s;
            border: 2px solid #D4AF37;
        }
        .btn-gold:hover {
            background-color: transparent;
            color: #D4AF37;
            transform: scale(1.05);
        }
    </style>
</head>
<body>
    <div class="hero">
        <div>
            <h1>AI-MIZAN</h1>
            <p>Advanced Food Price Analytics for the Iranian Market</p>
            <a href="/predictdata" class="btn-gold">Enter Analysis Terminal</a>
        </div>
    </div>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Al-Mizan | Premium Analytics</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600&family=Lora:wght@400;500&display=swap" rel="stylesheet">
    <style>
        body {
            background-color: #fdf5e6;
            font-family: 'Lora', serif;
            background-image: url('https://www.transparenttextures.com/patterns/gray-floral.png');
            margin: 0;
        }
        .nav-custom {
            background-color: #06402B;
            padding: 25px;
            border-bottom: 4px solid #D4AF37;
            box-shadow: 0 4px 15px rgba(0,0,0,0.2);
        }
        .brand-text {
            font-family: 'Playfair Display', serif;
            color: #D4AF37;
            font-size: 2.2rem;
            letter-spacing: 4px;
            text-transform: uppercase;
            text-decoration: none;
        }
        .main-card {
            background-color: #ffffff;
            border: none;
            border-radius: 0;
            box-shadow: 0 20px 40px rgba(0,0,0,0.1);
            border-top: 10px solid #06402B;
            margin-top: 40px;
            padding: 50px;
        }
        .form-label {
            color: #06402B;
            font-weight: 600;
            text-transform: uppercase;
            font-size: 0.8rem;
            letter-spacing: 1px;
            margin-bottom: 10px;
        }
        .form-control, .form-select {
            border-radius: 0;
            border: 1px solid #ddd;
            padding: 12px;
        }
        .form-control:focus, .form-select:focus {
            border-color: #D4AF37;
            box-shadow: none;
        }
        .btn-predict {
            background-color: #06402B;
            color: #D4AF37;
            border: 1px solid #06402B;
            padding: 18px;
            width: 100%;
            font-weight: bold;
            letter-spacing: 3px;
            text-transform: uppercase;
            transition: 0.4s;
            cursor: pointer;
            margin-top: 30px;
        }
        .btn-predict:hover {
            background-color: #D4AF37;
            color: #06402B;
        }
        .result-display {
            background-color: #06402B;
            color: #D4AF37;
            padding: 40px;
            margin-top: 40px;
            text-align: center;
            border: 2px solid #D4AF37;
        }
    </style>
</head>
<body>

    <div class="nav-custom text-center">
        <a href="/" class="brand-text">AI-MIZAN ANALYTICS</a>
    </div>

    <div class="container pb-5">
        <div class="row justify-content-center">
            <div class="col-md-10 col-lg-8">
                <div class="card main-card">
                    <h3 class="text-center mb-5" style="color: #06402B; font-family: 'Playfair Display'; font-size: 2rem;">Market Analysis Terminal</h3>
                    
                    <form action="{{ url_for('predict_datapoint')}}" method="post">
                        <div class="row g-4">
                            <div class="col-md-6">
                                <label class="form-label">Category</label>
                                <select class="form-select" id="category" name="category" required onchange="filterCommodities()">
                                    <option value="" selected disabled>Select Category</option>
                                    <option value="cereals and tubers">Cereals and Tubers</option>
                                    <option value="meat, fish and eggs">Meat, Fish and Eggs</option>
                                    <option value="milk and dairy">Milk and Dairy</option>
                                    <option value="oil and fats">Oil and Fats</option>
                                    <option value="pulses and nuts">Pulses and Nuts</option>
                                    <option value="vegetables and fruits">Vegetables and Fruits</option>
                                    <option value="miscellaneous food">Miscellaneous Food</option>
                                    <option value="non-food">Non-Food</option>
                                </select>
                            </div>

                            <div class="col-md-6">
                                <label class="form-label">Commodity</label>
                                <select class="form-select" id="commodity" name="commodity" required>
                                    <option value="" selected disabled>First select a category</option>
                                </select>
                            </div>

                            <div class="col-md-6">
                                <label class="form-label">Unit</label>
                                <select class="form-select" name="unit" required>
                                    <option value="" selected disabled>Select Unit</option>
                                    <option value="KG">KG</option>
                                    <option value="0.13 KG">0.13 KG</option>
                                    <option value="1.8 KG">1.8 KG</option>
                                    <option value="810 G">810 G</option>
                                    <option value="900 G">900 G</option>
                                    <option value="750 G">750 G</option>
                                    <option value="500 G">500 G</option>
                                    <option value="450 G">450 G</option>
                                    <option value="240 G">240 G</option>
                                    <option value="180 G">180 G</option>
                                    <option value="500 ML">500 ML</option>
                                    <option value="450 ML">450 ML</option>
                                    <option value="200 ML">200 ML</option>
                                </select>
                            </div>

                            <div class="col-md-6">
                                <label class="form-label">Condition Status</label>
                                <select class="form-select" name="is_war">
                                    <option value="0">Standard (Stability)</option>
                                    <option value="1">Conflict (Crisis)</option>
                                </select>
                            </div>

                            <div class="col-md-6">
                                <label class="form-label">Month</label>
                                <input class="form-control" type="number" name="month" min="1" max="12" required>
                            </div>

                            <div class="col-md-6">
                                <label class="form-label">Day</label>
                                <input class="form-control" type="number" name="day" min="1" max="31" required>
                            </div>
                        </div>

                        <button type="submit" class="btn-predict">Execute Forecast</button>
                    </form>

                    {% if results %}
                    <div class="result-display">
                        <p style="color: #FDF5E6; text-transform: uppercase; letter-spacing: 2px;">Predicted Market Value</p>
                        <h1 style="font-size: 4rem; font-family: 'Playfair Display';">${{ results | round(2) }} <span style="font-size: 1.5rem;">USD</span></h1>
                    </div>
                    {% endif %}
                </div>
            </div>
        </div>
    </div>

    <script>
        const commodityData = {
            "cereals and tubers": ["Rice", "Bread", "Wheat flour", "Pasta", "Potatoes"],
            "meat, fish and eggs": ["Meat (beef)", "Meat (chicken)", "Fish (tuna, canned)", "Eggs"],
            "milk and dairy": ["Milk (pasteurized)", "Cheese (local)", "Yogurt"],
            "oil and fats": ["Oil (vegetable)", "Oil (sunflower)"],
            "pulses and nuts": ["Lentils (green)", "Beans (kidney red)", "Peas (yellow, split)", "Chickpeas"],
            "vegetables and fruits": ["Tomatoes", "Cucumbers", "Eggplants", "Onions", "Apples", "Parsley"],
            "miscellaneous food": ["Sugar (white)", "Salt (iodised)", "Tea (black)", "Tomatoes (paste)"],
            "non-food": ["Shampoo", "Handwash soap", "Bleach (chlorine)", "Alcohol (spray)", "Exchange rate (unofficial)"]
        };

        function filterCommodities() {
            const categorySelect = document.getElementById('category');
            const commoditySelect = document.getElementById('commodity');
            const selectedCategory = categorySelect.value;

            commoditySelect.innerHTML = '<option value="" selected disabled>Select Commodity</option>';

            if (commodityData[selectedCategory]) {
                commodityData[selectedCategory].forEach(item => {
                    const option = document.createElement('option');
                    option.value = item;
                    option.textContent = item;
                    commoditySelect.appendChild(option);
                });
            }
        }
    </script>
</body>
</html>
